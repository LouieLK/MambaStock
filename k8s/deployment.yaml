# k8s/deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mambaquant-api-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: mambaquant

  template:
    metadata:
      labels:
        app: mambaquant
    spec:
      containers:
      - name: mambaquant-container
        image: mambaquant-api:latest
        
        imagePullPolicy: Never
        
        ports:
        - containerPort: 8000